<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 240">
  <!-- Mascotte: maialino nel verde acqua brand (#41E0B4, identico nei due
       temi) con dettagli inchiostro, come il logo. Unica fonte del disegno:
       usata nel masthead e renderizzata in vendor/img/og.png. -->
  <!-- istogramma dati in sottoposizione -->
  <g opacity="0.9">
    <rect x="170" y="118" width="24" height="94" rx="5" fill="#2E5FD0"/>
    <rect x="204" y="92" width="24" height="120" rx="5" fill="#E5A44C"/>
    <rect x="238" y="60" width="24" height="152" rx="5" fill="#41E0B4"/>
  </g>
  <!-- codina -->
  <path d="M 20 132 C -4 128 -4 102 18 104" fill="none" stroke="#10231C" stroke-width="7" stroke-linecap="round"/>
  <!-- zampe: trotter dietro il corpo -->
  <path d="M 63 192 L 63 219 Q 63 226 70 226 L 82 226 Q 89 226 89 219 L 89 192 Z" fill="#41E0B4" stroke="#10231C" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 126 192 L 126 219 Q 126 226 133 226 L 145 226 Q 152 226 152 219 L 152 192 Z" fill="#41E0B4" stroke="#10231C" stroke-width="7" stroke-linejoin="round"/>
  <!-- corpo -->
  <ellipse cx="102" cy="140" rx="86" ry="71" fill="#41E0B4" stroke="#10231C" stroke-width="7"/>
  <!-- orecchio -->
  <path d="M 136 80 Q 154 54 172 76 Q 162 92 146 98 Z" fill="#41E0B4" stroke="#10231C" stroke-width="7" stroke-linejoin="round"/>
  <!-- fessura -->
  <rect x="72" y="66" width="58" height="9" rx="4.5" fill="#10231C"/>
  <!-- moneta in caduta -->
  <circle cx="101" cy="34" r="19" fill="#E5A44C"/>
  <text x="101" y="42" font-size="22" font-weight="bold" fill="#10231C" text-anchor="middle" font-family="Arial, sans-serif">€</text>
  <g stroke="#8FA095" stroke-width="3.5" stroke-linecap="round" opacity="0.8">
    <line x1="88" y1="56" x2="90" y2="63"/>
    <line x1="114" y1="56" x2="112" y2="63"/>
  </g>
  <!-- muso -->
  <ellipse cx="188" cy="138" rx="23" ry="19" fill="#41E0B4" stroke="#10231C" stroke-width="7"/>
  <ellipse cx="181" cy="138" rx="3.2" ry="6" fill="#10231C"/>
  <ellipse cx="196" cy="138" rx="3.2" ry="6" fill="#10231C"/>
  <!-- occhio -->
  <circle cx="148" cy="114" r="6" fill="#10231C"/>
  <!-- pavimento -->
  <line x1="30" y1="235" x2="250" y2="235" stroke="#8FA095" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
</svg>
